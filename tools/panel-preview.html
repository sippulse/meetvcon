<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MeetVcon panel preview</title>
  <link rel="stylesheet" href="../src/content/panel.css" />
  <style>
    body {
      margin: 0;
      font: 14px/1.5 -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      color: #fff;
      background: #202124;
      min-height: 100vh;
      overflow: hidden;
    }
    .meet-mock {
      position: relative;
      width: 100%;
      height: 100vh;
      background:
        radial-gradient(circle at 30% 40%, #2a3042 0%, #1a1c20 60%),
        #202124;
    }
    .video-tile {
      position: absolute;
      background: linear-gradient(160deg, #3c4043 0%, #2a2c31 100%);
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8eaed;
      font-weight: 500;
    }
    .video-tile.main {
      top: 60px;
      left: 60px;
      right: 60px;
      bottom: 200px;
      font-size: 32px;
    }
    .video-tile.thumb {
      bottom: 60px;
      width: 200px;
      height: 120px;
      font-size: 14px;
    }
    .thumb1 { left: 60px; }
    .thumb2 { left: 280px; }
    .thumb3 { left: 500px; }
    .controls-bar {
      position: absolute;
      bottom: 16px;
      right: 280px;
      display: flex;
      gap: 12px;
      background: rgba(60, 64, 67, 0.8);
      padding: 10px 16px;
      border-radius: 999px;
    }
    .control {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #3c4043;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #e8eaed;
      font-size: 16px;
    }
    .caption-strip {
      position: absolute;
      left: 50%;
      bottom: 220px;
      transform: translateX(-50%);
      background: rgba(0, 0, 0, 0.7);
      color: #fff;
      font-size: 18px;
      padding: 10px 18px;
      border-radius: 4px;
      max-width: 720px;
    }
    .caption-strip strong {
      color: #8ab4f8;
      margin-right: 8px;
    }
  </style>
</head>
<body>
  <div class="meet-mock">
    <div class="video-tile main">Jane Doe</div>
    <div class="video-tile thumb thumb1">You</div>
    <div class="video-tile thumb thumb2">Bob</div>
    <div class="video-tile thumb thumb3">Alice</div>

    <div class="caption-strip">
      <strong>Jane Doe:</strong>Thanks everyone for joining. Let's start with the pipeline review.
    </div>

    <div class="controls-bar">
      <div class="control">M</div>
      <div class="control">V</div>
      <div class="control">CC</div>
      <div class="control">L</div>
    </div>

    <div class="meetvcon-panel" id="meetvcon-panel">
      <div class="meetvcon-row">
        <span class="meetvcon-dot meetvcon-dot--green"></span>
        <span class="meetvcon-title">MeetVcon</span>
      </div>
      <div class="meetvcon-row meetvcon-status">Capturing captions</div>
      <div class="meetvcon-row meetvcon-actions">
        <button class="meetvcon-btn">Disable for this call</button>
      </div>
    </div>
  </div>
</body>
</html>
