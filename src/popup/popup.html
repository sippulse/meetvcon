<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>MeetVcon</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <header>
    <h1>MeetVcon</h1>
    <a href="#" id="openOptions" title="Open settings">Settings</a>
  </header>

  <section id="webhookStatus" class="webhook-status hidden">
    <span class="warn">⚠ No webhook URL configured.</span>
    <a href="#" id="openOptionsInline">Open settings →</a>
  </section>

  <section id="queueSection" class="section hidden">
    <h2>Pending delivery <span id="queueCount" class="count">0</span></h2>
    <ul id="queueList" class="list"></ul>
  </section>

  <section class="section">
    <h2>Recent meetings <span id="meetingsCount" class="count">0</span></h2>
    <ul id="meetingsList" class="list"></ul>
    <p id="meetingsEmpty" class="empty hidden">
      No meetings captured yet. Open a Google Meet call with the extension active.
    </p>
  </section>

  <script src="popup.js"></script>
</body>
</html>
